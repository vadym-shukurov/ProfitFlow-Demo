app = "profitflow-api-production"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVER_PORT = "8080"
  # Bind publicly for Fly proxy/health checks.
  JAVA_TOOL_OPTIONS = "-Dserver.address=0.0.0.0"
  # NOTE: For a real production posture, switch to SPRING_PROFILES_ACTIVE=prod and
  # set required secrets (DB_URL/DB_USERNAME/DB_PASSWORD, RSA keys, etc.) via Fly secrets.
  SPRING_PROFILES_ACTIVE = "e2e"
  ALLOWED_ORIGINS = "https://profitflow-ui-production.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "45s"
    method = "GET"
    path = "/actuator/health"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory = "1024mb"
