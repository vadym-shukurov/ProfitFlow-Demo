profitflow:
  outbox:
    dispatch:
      enabled: false

# Expose OpenAPI JSON for contract probes (E2E / tooling). Swagger UI stays off.
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: false

spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:profitflow;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
