# Profile "openapi-export": boot the full app with an in-memory H2 database so
# SpringDoc can expose /v3/api-docs without PostgreSQL (CI + local contract export).
# Activated only when explicitly requested — not used in production.
profitflow:
  security:
    # Allow curl-based export without an admin JWT (never enable in prod).
    openapi-unauthenticated-access: true

spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:openapiexport;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
  jpa:
    hibernate:
      ddl-auto: create-drop
