# Profile "e2e": in-memory H2 + OpenAPI for packaged JAR runs (Playwright / local smoke).
# Activated via: --spring.profiles.active=e2e (see e2e/scripts/ci-with-servers.sh).
# JUnit continues to use classpath application-test.yml with @ActiveProfiles("test").

profitflow:
  outbox:
    dispatch:
      enabled: false
  security:
    # E2E runs are bursty (many logins in <1 minute). Keep production defaults elsewhere.
    rate-limit:
      auth: 1000
      run: 200
      general: 20000

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: false

spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:profitflow_e2e;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
