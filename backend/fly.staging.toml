app = "profitflow-api-staging"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVER_PORT = "8080"
  # Fly proxy reaches the app over the machine's private network interface.
  # Binding to 127.0.0.1 makes it unreachable from fly-proxy health checks.
  SERVER_ADDRESS = "0.0.0.0"
  # Do NOT set SPRING_PROFILES_ACTIVE=prod in staging; prod profile enforces stricter secret requirements.
  # Default profile + env-injected DB settings are sufficient for staging/demo.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "45s"
    method = "GET"
    path = "/actuator/health"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory = "1024mb"
