# ── Local dev profile (no Docker / PostgreSQL required) ─────────────────────
# Uses H2 in-memory database so the app starts without any external services.
# Activate with:  mvn spring-boot:run -Dspring-boot.run.profiles=local
#
# SECURITY NOTE: H2 console is disabled even in local profile.
# Access the database via the application API or a DB client on jdbc:h2:mem:profitflow.
spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:profitflow;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      # H2 console disabled — exposes the DB to anyone with network access
      enabled: false

# In local dev, print structured logs without the noisy security filter warnings
logging:
  level:
    org.springframework.security: INFO
