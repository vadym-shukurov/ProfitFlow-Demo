global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate alert rules
  external_labels:
    cluster: local
    app:     profitflow

# SLO alert rules
rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  # Scrape the Spring Boot Actuator Prometheus endpoint
  - job_name: profitflow-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          # In docker-compose, use the host gateway to reach the Spring Boot app
          # running on the host machine (not inside a container).
          - host.docker.internal:8080
        labels:
          service: profitflow-api
          env:     local
