# SonarCloud / SonarQube — Java (backend) + TypeScript (frontend).
#
# CI: .github/workflows/sonarcloud.yml runs Maven verify then sonar-scanner. Default host below is
# for SonarCloud; self-hosted overrides via -Dsonar.host.url in the workflow.

sonar.host.url=https://sonarcloud.io
sonar.projectName=ProfitFlow

sonar.sourceEncoding=UTF-8

# Compiled bytecode (required for Java analysis). backend/target/** stays out of sonar.sources /
# sonar.exclusions only affect sources — binaries path is separate.
sonar.java.binaries=backend/target/classes,backend/target/test-classes

# Third-party JARs (CI: mvn dependency:copy-dependencies → backend/target/dependency).
# Use a wildcard so the scanner indexes JARs explicitly (directory-only paths can be reported empty).
# SonarCloud Automatic Analysis does not run this Maven step — use CI analysis for full Java precision.
sonar.java.libraries=backend/target/dependency/*.jar

# Production sources — specs excluded here and included as tests below
sonar.sources=backend/src/main/java,frontend/src
sonar.exclusions=**/node_modules/**,\
  frontend/dist/**,\
  **/*.spec.ts,\
  frontend/src/app/api-types.generated.ts,\
  backend/target/**,\
  **/e2e/**

# Tests: backend unit tests + Angular *.spec.ts under frontend/src
sonar.tests=backend/src/test/java,frontend/src
sonar.test.inclusions=**/*.spec.ts

# Coverage reports (CI generates these before sonar-scanner)
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/frontend/lcov.info

# Match backend JaCoCo gate exclusions + generated API types
sonar.coverage.exclusions=**/DemoDataSeeder.java,\
  **/ProfitflowApplication.java,\
  **/adapter/out/persistence/entity/**,\
  **/adapter/out/persistence/PersistenceMapper.java,\
  **/application/model/**,\
  frontend/src/app/api-types.generated.ts,\
  **/*.spec.ts

sonar.cpd.exclusions=**/application/model/**,\
  **/adapter/in/web/dto/**,\
  **/adapter/out/persistence/entity/**

sonar.typescript.tsconfigPath=frontend/tsconfig.json
