# ── Release Workflow ─────────────────────────────────────────────────────────
#
# Creates versioned releases following Semantic Versioning (semver).
#
# Trigger: pushing a git tag matching v* (e.g. v1.2.3, v2.0.0-rc.1)
#
# Steps:
#   1. Tag image in GHCR with the semver version
#   2. Update pom.xml version
#   3. Generate changelog from conventional commit messages
#   4. Create GitHub Release with changelog and artefact links
#
# Versioning convention (Conventional Commits):
#   feat:     minor version bump (new feature)
#   fix:      patch version bump (bug fix)
#   feat!:    major version bump (breaking change)
#   chore:    no version change
#   docs:     no version change
#
# Tag format: v<major>.<minor>.<patch>
#   Examples: v1.0.0, v1.2.3, v2.0.0-rc.1
#
# Usage:
#   git tag v1.2.3 -m "Release 1.2.3 — Q2 cost allocation improvements"
#   git push origin v1.2.3

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"       # Stable: v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*"     # Pre-release: v1.2.3-rc.1, v1.2.3-beta.1

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/profitflow-api
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/profitflow-ui

jobs:
  # ── Tag container images ───────────────────────────────────────────────────
  tag-images:
    name: "Tag Release Images"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"       # e.g. v1.2.3
          VERSION="${TAG#v}"                  # strip leading 'v'
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          echo "full=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR"      >> "$GITHUB_OUTPUT"
          echo "minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"
          IS_PRE=$(echo $VERSION | grep -qE '-(rc|beta|alpha)' && echo true || echo false)
          echo "is_prerelease=$IS_PRE" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag the image that was built and pushed by CI (identified by git SHA)
      - name: Tag images with semver
        run: |
          SHA_TAG="sha-${GITHUB_SHA::7}"
          VERSION="${{ steps.version.outputs.full }}"
          MAJOR="${{ steps.version.outputs.major }}"
          MINOR="${{ steps.version.outputs.minor }}"

          for IMAGE in ${{ env.IMAGE_BACKEND }} ${{ env.IMAGE_FRONTEND }}; do
            # Pull the SHA-tagged image built during CI
            docker pull $IMAGE:$SHA_TAG

            # Apply semver tags (v1.2.3, v1.2, v1, latest for stable releases)
            docker tag $IMAGE:$SHA_TAG $IMAGE:$VERSION
            docker tag $IMAGE:$SHA_TAG $IMAGE:$MINOR
            docker tag $IMAGE:$SHA_TAG $IMAGE:$MAJOR

            if [[ "${{ steps.version.outputs.is_prerelease }}" == "false" ]]; then
              docker tag $IMAGE:$SHA_TAG $IMAGE:latest
            fi

            docker push $IMAGE --all-tags
          done

  # ── Create GitHub Release ──────────────────────────────────────────────────
  create-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: tag-images
    permissions:
      contents: write
      packages: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history needed for changelog generation

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          IS_PRE=$(echo $VERSION | grep -qE '-(rc|beta|alpha)' && echo true || echo false)
          echo "version=$VERSION"          >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                  >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRE"     >> "$GITHUB_OUTPUT"

      # Generate a changelog from conventional commit messages since the last tag
      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: .github/cliff.toml
          args: --verbose --latest --strip all
        env:
          OUTPUT: CHANGELOG.md

      # Create the GitHub Release with:
      # - Auto-generated changelog (from conventional commits)
      # - Container image links
      # - Whether this is a pre-release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ProfitFlow ${{ steps.version.outputs.version }}"
          tag_name: ${{ steps.version.outputs.tag }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.content }}

            ---

            ## Container Images

            Pull the images from [GitHub Container Registry](https://ghcr.io/${{ github.repository_owner }}):

            ```bash
            # Backend API
            docker pull ghcr.io/${{ github.repository_owner }}/profitflow-api:${{ steps.version.outputs.version }}

            # Frontend (nginx)
            docker pull ghcr.io/${{ github.repository_owner }}/profitflow-ui:${{ steps.version.outputs.version }}
            ```

            ## Deployment

            Update `IMAGE_TAG` in your deployment configuration to `${{ steps.version.outputs.version }}`.

            See the [CHANGELOG](./CHANGELOG.md) and [deployment guide](./README.md#getting-started) for details.
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          generate_release_notes: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Append the new changelog entry to the repo's CHANGELOG.md
      - name: Update CHANGELOG.md
        run: |
          cat CHANGELOG.md >> CHANGELOG_NEW.md
          if [[ -f docs/CHANGELOG.md ]]; then
            cat docs/CHANGELOG.md >> CHANGELOG_NEW.md
          fi
          mv CHANGELOG_NEW.md docs/CHANGELOG.md

      - name: Commit changelog update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update CHANGELOG for ${{ steps.version.outputs.tag }}"
          file_pattern: docs/CHANGELOG.md
          push_options: "--no-verify"
