# SonarCloud or self-hosted SonarQube — coverage, duplication, security hotspots.
#
# Secrets (repository → Settings → Secrets and variables → Actions):
#   Required (both modes):
#     SONAR_TOKEN          — user token (SonarCloud or SonarQube, “Execute analysis”)
#     SONAR_PROJECT_KEY    — project key
#   SonarCloud (leave SONAR_HOST_URL unset):
#     SONAR_ORGANIZATION   — organization key (SonarCloud → My Organizations → Key)
#   Self-hosted SonarQube:
#     SONAR_HOST_URL       — server base URL (e.g. https://sonar.example.com)
#
# SonarCloud: if you use CI analysis here, turn off Automatic analysis for the project
# (Administration → Analysis Method) — SonarCloud rejects CI + automatic together.

name: SonarCloud

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  workflow_dispatch:

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: Sonar analysis
    runs-on: ubuntu-latest
    # Fork PRs: no access to repository secrets — skip (same pattern as codecov-style tools).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve Sonar configuration
        id: cfg
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Set SONAR_TOKEN and SONAR_PROJECT_KEY. See README → Testing → Quality analysis (SonarQube and SonarCloud)."
            exit 0
          fi
          if [ -n "$SONAR_HOST_URL" ]; then
            echo "mode=sq" >> "$GITHUB_OUTPUT"
          else
            if [ -z "$SONAR_ORGANIZATION" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::notice::SonarCloud requires SONAR_ORGANIZATION, or set SONAR_HOST_URL for self-hosted SonarQube."
              exit 0
            fi
            echo "mode=cloud" >> "$GITHUB_OUTPUT"
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        if: steps.cfg.outputs.skip == 'false'
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Set up Node
        if: steps.cfg.outputs.skip == 'false'
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # JaCoCo XML (verify runs tests + report; skip ITs/Docker, skip heavy plugins for speed).
      # With skipITs, branch coverage is slightly below the pom's 75% JaCoCo gate — main CI still
      # enforces thresholds on full verify -DskipITs=false. Here we only need XML for Sonar.
      - name: Backend verify + JaCoCo report
        if: steps.cfg.outputs.skip == 'false'
        working-directory: backend
        run: >
          mvn -B -U verify
          -DskipITs=true
          -Dspotbugs.skip=true
          -Dpmd.skip=true
          -Dcheckstyle.skip=true
          -Djacoco.haltOnFailure=false

      - name: Frontend unit tests + LCOV
        if: steps.cfg.outputs.skip == 'false'
        working-directory: frontend
        run: |
          npm ci --prefer-online
          npx ng test --watch=false --browsers=ChromeHeadless --code-coverage --no-progress

      - name: SonarCloud analysis
        if: steps.cfg.outputs.skip == 'false' && steps.cfg.outputs.mode == 'cloud'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

      - name: SonarQube analysis (self-hosted)
        if: steps.cfg.outputs.skip == 'false' && steps.cfg.outputs.mode == 'sq'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
