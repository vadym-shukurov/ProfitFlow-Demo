# SonarCloud — duplication %, coverage on new code, security hotspots, PR decoration.
# Requires repository secrets: SONAR_TOKEN, SONAR_ORGANIZATION, SONAR_PROJECT_KEY
# (see README → CI/CD → SonarCloud setup).

name: SonarCloud

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  workflow_dispatch:

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    # Fork PRs: no access to repository secrets — skip (same pattern as codecov-style tools).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check SonarCloud secrets
        id: cfg
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::SONAR_TOKEN is not set — skipping SonarCloud. Add SONAR_TOKEN, SONAR_ORGANIZATION, and SONAR_PROJECT_KEY in repository secrets (see README)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        if: steps.cfg.outputs.skip == 'false'
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Set up Node
        if: steps.cfg.outputs.skip == 'false'
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # JaCoCo XML (verify runs tests + report; skip ITs/Docker, skip heavy plugins for speed)
      - name: Backend verify + JaCoCo report
        if: steps.cfg.outputs.skip == 'false'
        working-directory: backend
        run: mvn -B verify -DskipITs=true -Dspotbugs.skip=true -Dpmd.skip=true -Dcheckstyle.skip=true

      - name: Frontend unit tests + LCOV
        if: steps.cfg.outputs.skip == 'false'
        working-directory: frontend
        run: |
          npm ci --prefer-offline
          npx ng test --watch=false --browsers=ChromeHeadless --code-coverage --no-progress

      - name: Validate SonarCloud project secrets
        if: steps.cfg.outputs.skip == 'false'
        env:
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "$SONAR_ORGANIZATION" ] || [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "::error::Set SONAR_ORGANIZATION and SONAR_PROJECT_KEY (with SONAR_TOKEN) in repository Actions secrets."
            exit 1
          fi

      - name: SonarCloud Scan
        if: steps.cfg.outputs.skip == 'false'
        # Pin major v5 — v6+ changed `args` quoting (see SonarSource/sonarqube-scan-action releases).
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

      - name: SonarCloud skipped
        if: steps.cfg.outputs.skip == 'true'
        run: echo "SonarCloud analysis skipped (configure secrets to enable)."
