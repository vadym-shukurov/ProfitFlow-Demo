# SonarCloud or self-hosted SonarQube — coverage, duplication, security hotspots.
#
# Secrets (repository → Settings → Secrets and variables → Actions):
#   Required (both modes):
#     SONAR_TOKEN          — user token (SonarCloud or SonarQube, “Execute analysis”)
#     SONAR_PROJECT_KEY    — project key
#   SonarCloud (leave SONAR_HOST_URL unset):
#     SONAR_ORGANIZATION   — organization key (SonarCloud → My Organizations → Key)
#   Self-hosted SonarQube:
#     SONAR_HOST_URL       — server base URL (e.g. https://sonar.example.com)
#
# SonarCloud: if you use CI analysis here, turn off Automatic analysis for the project
# (Administration → Analysis Method) — SonarCloud rejects CI + automatic together.

name: SonarCloud

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  workflow_dispatch:

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: Sonar analysis
    runs-on: ubuntu-latest
    # Fork PRs: no access to repository secrets — skip (same pattern as codecov-style tools).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve Sonar configuration
        id: cfg
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Set SONAR_TOKEN and SONAR_PROJECT_KEY. See README → Testing → Quality analysis (SonarQube and SonarCloud)."
            exit 0
          fi
          if [ -n "$SONAR_HOST_URL" ]; then
            echo "mode=sq" >> "$GITHUB_OUTPUT"
          else
            if [ -z "$SONAR_ORGANIZATION" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::notice::SonarCloud requires SONAR_ORGANIZATION, or set SONAR_HOST_URL for self-hosted SonarQube."
              exit 0
            fi
            echo "mode=cloud" >> "$GITHUB_OUTPUT"
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        if: steps.cfg.outputs.skip == 'false'
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Set up Node
        if: steps.cfg.outputs.skip == 'false'
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Build Java before Sonar: verify → classes + JaCoCo XML; copy-dependencies → JARs for
      # sonar.java.libraries (compile + test + provided so main and test sources resolve types).
      # Note: This job runs without Docker dependencies by default (skip ITs).
      - name: Backend verify + JaCoCo report
        if: steps.cfg.outputs.skip == 'false'
        working-directory: backend
        run: |
          mvn -B -U verify \
            -DskipITs=true \
            -Dspotbugs.skip=true \
            -Dpmd.skip=true \
            -Dcheckstyle.skip=true \
            -Djacoco.haltOnFailure=false
          rm -rf target/dependency
          mkdir -p target/dependency
          # Separate scopes — maven-dependency-plugin does not accept comma-separated includeScope.
          mvn -B dependency:copy-dependencies \
            -DoutputDirectory=target/dependency \
            -DincludeScope=runtime
          mvn -B dependency:copy-dependencies \
            -DoutputDirectory=target/dependency \
            -DincludeScope=test
          mvn -B dependency:copy-dependencies \
            -DoutputDirectory=target/dependency \
            -DincludeScope=provided
          n="$(find target/dependency -maxdepth 1 -name '*.jar' | wc -l | tr -d ' ')"
          if [ "$n" -eq 0 ]; then
            echo "::error::No dependency JARs in target/dependency — sonar.java.libraries will be empty"
            exit 1
          fi
          echo "Copied $n JARs for Sonar Java libraries"

      - name: Frontend unit tests + LCOV
        if: steps.cfg.outputs.skip == 'false'
        working-directory: frontend
        run: |
          npm ci --prefer-online
          npx ng test --watch=false --browsers=ChromeHeadless --code-coverage --no-progress

      - name: SonarCloud analysis
        if: steps.cfg.outputs.skip == 'false' && steps.cfg.outputs.mode == 'cloud'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

      - name: SonarQube analysis (self-hosted)
        if: steps.cfg.outputs.skip == 'false' && steps.cfg.outputs.mode == 'sq'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

      # Repo-wide enforcement (coverage + duplication) using Sonar as the source of truth.
      # Note: This is intentionally separate from Sonar's server-side Quality Gate so
      # forks and self-hosted instances can still enforce the policy consistently.
      - name: Enforce repo quality thresholds (coverage + duplication)
        if: steps.cfg.outputs.skip == 'false'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          set -euo pipefail

          # SonarCloud uses a different API host than sonar.host.url
          if [ -n "${SONAR_HOST_URL:-}" ]; then
            api_base="${SONAR_HOST_URL%/}"
          else
            api_base="https://sonarcloud.io"
          fi

          # Query on the PR branch when available; fall back to main branch for pushes.
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"

          # Metrics:
          # - coverage: overall test coverage ratio (0-100)
          # - duplicated_lines_density: duplication percentage (0-100)
          metrics="coverage,duplicated_lines_density,reliability_rating,security_rating,sqale_rating"

          echo "Checking Sonar measures on ${api_base} for project=${SONAR_PROJECT_KEY} branch=${branch}"

          export api_base branch metrics
          python - <<'PY'
          import json, os, sys, urllib.parse, urllib.request

          api_base = os.environ["api_base"]
          token = os.environ["SONAR_TOKEN"]
          project = os.environ["SONAR_PROJECT_KEY"]
          branch = os.environ.get("branch", "main")
          metrics = os.environ["metrics"]

          def get(url: str) -> dict:
              req = urllib.request.Request(url)
              auth = (token + ":").encode("utf-8")
              import base64
              req.add_header("Authorization", "Basic " + base64.b64encode(auth).decode("ascii"))
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read().decode("utf-8"))

          q = urllib.parse.urlencode({
              "component": project,
              "metricKeys": metrics,
              "branch": branch,
          })
          url = f"{api_base}/api/measures/component?{q}"
          data = get(url)

          measures = {m["metric"]: m.get("value") for m in data["component"].get("measures", [])}

          def f(metric: str):
              v = measures.get(metric)
              return float(v) if v is not None else None

          coverage = f("coverage")
          dup = f("duplicated_lines_density")
          rel = f("reliability_rating")
          sec = f("security_rating")
          maint = f("sqale_rating")

          print("Sonar measures:")
          print("  coverage:", coverage)
          print("  duplicated_lines_density:", dup)
          print("  reliability_rating:", rel)
          print("  security_rating:", sec)
          print("  sqale_rating:", maint)

          failures = []
          if coverage is None:
              failures.append("coverage metric missing")
          elif coverage < 85.0:
              failures.append(f"coverage {coverage:.2f}% < 85%")

          if dup is None:
              failures.append("duplicated_lines_density metric missing")
          elif dup >= 5.0:
              failures.append(f"duplication {dup:.2f}% >= 5%")

          # Sonar ratings: 1.0=A ... 5.0=E
          for metric, value in [
              ("reliability_rating", rel),
              ("security_rating", sec),
              ("sqale_rating", maint),
          ]:
              if value is None:
                  failures.append(f"{metric} missing")
              elif value > 1.0:
                  failures.append(f"{metric} is not A (value={value})")

          if failures:
              print("Quality threshold failures:")
              for fmsg in failures:
                  print(" -", fmsg)
              sys.exit(1)

          print("Quality thresholds met.")
          PY
