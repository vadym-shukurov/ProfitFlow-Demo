# Self-hosted SonarQube — coverage, duplication, security hotspots (CI upload via sonar-scanner).
# SonarCloud is not scanned from this workflow; use SonarCloud Automatic Analysis or another pipeline.
#
# Secrets (repository → Settings → Secrets and variables → Actions):
#   Required:
#     SONAR_TOKEN          — user token with “Execute analysis” permission
#     SONAR_PROJECT_KEY    — project key on the server
#     SONAR_HOST_URL       — base URL, e.g. https://sonar.company.com (must be reachable from GitHub-hosted runners)

name: SonarQube

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  workflow_dispatch:

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: Sonar analysis
    runs-on: ubuntu-latest
    # Fork PRs: no access to repository secrets — skip (same pattern as codecov-style tools).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve Sonar configuration
        id: cfg
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Set SONAR_TOKEN, SONAR_PROJECT_KEY, and SONAR_HOST_URL for self-hosted SonarQube. See README → Testing → Quality analysis (SonarQube and SonarCloud)."
            exit 0
          fi
          if [ -z "$SONAR_HOST_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Set SONAR_HOST_URL only for self-hosted SonarQube. For SonarCloud, use Automatic Analysis in the SonarCloud UI — do not run sonar-scanner against sonarcloud.io from Actions (SonarCloud blocks duplicate CI + automatic scans)."
            exit 0
          fi
          HOST_LC=$(echo "$SONAR_HOST_URL" | tr '[:upper:]' '[:lower:]')
          case "$HOST_LC" in
            *sonarcloud.io*)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::notice::SONAR_HOST_URL must not point at SonarCloud when Automatic Analysis is enabled. Remove this secret or use your self-hosted SonarQube URL only. SonarCloud: Administration → Analysis Method → Automatic analysis."
              exit 0
              ;;
          esac
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        if: steps.cfg.outputs.skip == 'false'
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Set up Node
        if: steps.cfg.outputs.skip == 'false'
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # JaCoCo XML (verify runs tests + report; skip ITs/Docker, skip heavy plugins for speed).
      # With skipITs, branch coverage is slightly below the pom's 75% JaCoCo gate — main CI still
      # enforces thresholds on full verify -DskipITs=false. Here we only need XML for Sonar.
      - name: Backend verify + JaCoCo report
        if: steps.cfg.outputs.skip == 'false'
        working-directory: backend
        run: >
          mvn -B -U verify
          -DskipITs=true
          -Dspotbugs.skip=true
          -Dpmd.skip=true
          -Dcheckstyle.skip=true
          -Djacoco.haltOnFailure=false

      - name: Frontend unit tests + LCOV
        if: steps.cfg.outputs.skip == 'false'
        working-directory: frontend
        run: |
          npm ci --prefer-online
          npx ng test --watch=false --browsers=ChromeHeadless --code-coverage --no-progress

      - name: SonarQube analysis (self-hosted)
        if: steps.cfg.outputs.skip == 'false'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

      - name: Sonar skipped
        if: steps.cfg.outputs.skip == 'true'
        run: echo "Sonar analysis skipped (configure secrets to enable)."
