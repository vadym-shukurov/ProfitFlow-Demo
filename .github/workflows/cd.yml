# ── Continuous Deployment ─────────────────────────────────────────────────────
#
# Triggered automatically when the CI pipeline succeeds on the main branch,
# or manually via workflow_dispatch for hotfixes.
#
# Deployment pipeline:
#
#   ┌───────────────────┐
#   │   deploy-staging  │  Auto-deploy to staging on every main push
#   │   (docker-compose │
#   │    or k8s apply)  │
#   └────────┬──────────┘
#            │
#   ┌────────▼──────────┐
#   │   smoke-tests     │  API health + critical path checks
#   │   (curl + wait)   │
#   └────────┬──────────┘
#            │
#   ┌────────▼──────────┐
#   │  await-approval   │  Manual approval gate — required for production
#   │  (environment     │  Reviewers: set in Settings → Environments → production
#   │   protection)     │
#   └────────┬──────────┘
#            │
#   ┌────────▼──────────┐
#   │  deploy-prod      │  Blue/green or rolling deploy
#   │  + health check   │
#   └────────┬──────────┘
#            │ (failure)
#   ┌────────▼──────────┐
#   │  rollback-prod    │  Auto-rollback to the previous known-good image
#   └───────────────────┘
#
# Required secrets:
#   STAGING_SSH_KEY          — SSH private key for the staging server
#   STAGING_HOST             — Staging server hostname
#   STAGING_USER             — SSH user on the staging server
#   PRODUCTION_SSH_KEY       — SSH private key for the production server
#   PRODUCTION_HOST          — Production server hostname
#   PRODUCTION_USER          — SSH user on the production server
#   SLACK_WEBHOOK_URL        — Slack webhook for deployment notifications
#   DB_URL                   — Database URL (per environment, set in Environment)
#   DB_USERNAME              — Database username
#   DB_PASSWORD              — Database password (use GitHub Environments for scope)
#   POSTGRES_PASSWORD        — Postgres root password
#   ALLOWED_ORIGINS          — Comma-separated CORS origins (e.g. https://app.example.com)
#
# GitHub Environments to configure:
#   staging    — auto-deploys, no approval required
#   production — requires manual approval from a Finance or Engineering lead

name: CD

on:
  # Trigger after CI completes successfully on main
  workflow_run:
    workflows: [CI]
    types: [completed]
    # Support repos that still use master as the default branch.
    branches: [main, master]
  # Allow manual deployment for hotfixes
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, production]
        default: staging
      image_tag:
        description: "Image tag to deploy (default: latest sha)"
        required: false
        default: ""

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false  # Never cancel in-progress deployments

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/profitflow-api
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/profitflow-ui

jobs:
  # ── Resolve image tag ──────────────────────────────────────────────────────
  resolve-tag:
    name: "Resolve Image Tag"
    runs-on: ubuntu-latest
    # Only run if CI succeeded (or manual trigger)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            echo "value=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            # Use the SHA of the triggering commit for exact traceability
            SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
            echo "value=sha-${SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

  # ── Deploy to staging ──────────────────────────────────────────────────────
  deploy-staging:
    name: "Deploy → Staging"
    runs-on: ubuntu-latest
    needs: resolve-tag
    environment:
      name: staging
      url: https://staging.profitflow.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Copy the docker-compose override and .env to the staging server,
      # then pull the new images and do a rolling restart.
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /opt/profitflow

            # Pull updated images
            docker pull ${{ env.IMAGE_BACKEND }}:${{ needs.resolve-tag.outputs.tag }}
            docker pull ${{ env.IMAGE_FRONTEND }}:${{ needs.resolve-tag.outputs.tag }}

            # Tag as 'current' so docker-compose.prod.yml always references
            # the currently-deployed version (simplifies rollback)
            docker tag ${{ env.IMAGE_BACKEND }}:${{ needs.resolve-tag.outputs.tag }} \
                       ${{ env.IMAGE_BACKEND }}:current
            docker tag ${{ env.IMAGE_FRONTEND }}:${{ needs.resolve-tag.outputs.tag }} \
                       ${{ env.IMAGE_FRONTEND }}:current

            # Rolling restart: bring up new containers, then remove old ones
            IMAGE_TAG=current docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Deployed tag=${{ needs.resolve-tag.outputs.tag }} to staging"

      - name: Notify Slack — staging deploy started
        uses: slackapi/slack-github-action@v1.27
        if: always()
        with:
          payload: |
            {
              "text": "🚀 *Staging deploy* `${{ needs.resolve-tag.outputs.tag }}` started by `${{ github.actor }}`",
              "blocks": [{
                "type": "section",
                "text": { "type": "mrkdwn",
                  "text": "🚀 *Staging deploy* `${{ needs.resolve-tag.outputs.tag }}`\nTriggered by: `${{ github.actor }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ── Smoke tests (staging) ──────────────────────────────────────────────────
  smoke-tests:
    name: "Smoke Tests — Staging"
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: staging

    steps:
      # Wait for the Spring Boot application to pass its health probe
      - name: Wait for API health
        run: |
          echo "Waiting for staging API to become healthy..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://staging.profitflow.example.com/actuator/health || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "API is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — retrying in 10s"
            sleep 10
          done
          echo "API did not become healthy within 5 minutes"
          exit 1

      # Critical-path smoke tests — verify key endpoints respond correctly
      - name: Critical path — unauthenticated health
        run: |
          curl -fsS https://staging.profitflow.example.com/actuator/health \
            | grep -q '"status":"UP"'
          echo "✓ /actuator/health is UP"

      - name: Critical path — login returns JWT
        env:
          # Credentials for the staging smoke-test user. Must be stored as GitHub
          # Secrets — never hard-coded. The smoke-test user should have ANALYST role
          # only (minimum permissions required for these checks).
          SMOKE_USERNAME: ${{ secrets.STAGING_SMOKE_USER }}
          SMOKE_PASSWORD: ${{ secrets.STAGING_SMOKE_PASSWORD }}
        run: |
          TOKEN=$(curl -fsS -X POST \
            https://staging.profitflow.example.com/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${SMOKE_USERNAME}\",\"password\":\"${SMOKE_PASSWORD}\"}" \
            | jq -r .accessToken)
          if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
            echo "Login did not return a token"
            exit 1
          fi
          echo "✓ Login returned a JWT"

      - name: Critical path — resource costs list (authenticated)
        env:
          SMOKE_USERNAME: ${{ secrets.STAGING_SMOKE_USER }}
          SMOKE_PASSWORD: ${{ secrets.STAGING_SMOKE_PASSWORD }}
        run: |
          TOKEN=$(curl -fsS -X POST \
            https://staging.profitflow.example.com/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${SMOKE_USERNAME}\",\"password\":\"${SMOKE_PASSWORD}\"}" \
            | jq -r .accessToken)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://staging.profitflow.example.com/api/v1/resource-costs)
          if [[ "$STATUS" != "200" ]]; then
            echo "Expected 200, got $STATUS"
            exit 1
          fi
          echo "✓ /api/v1/resource-costs returned 200"

      - name: Critical path — unauthenticated request returns 401
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://staging.profitflow.example.com/api/v1/resource-costs)
          if [[ "$STATUS" != "401" ]]; then
            echo "Expected 401, got $STATUS"
            exit 1
          fi
          echo "✓ Unauthenticated request correctly returns 401"

      - name: Notify Slack — smoke tests result
        uses: slackapi/slack-github-action@v1.27
        if: always()
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *Smoke tests* on staging: `${{ job.status }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ── Manual approval gate ───────────────────────────────────────────────────
  # GitHub Environments with required reviewers implement the approval gate.
  # Set required reviewers in: Settings → Environments → production
  await-approval:
    name: "Await Production Approval"
    runs-on: ubuntu-latest
    needs: smoke-tests
    environment:
      name: production
    # This step is just a gate — no commands needed.
    # The environment protection rules pause execution here until an approver
    # clicks "Approve" in the GitHub Actions UI.
    steps:
      - name: Approval received
        run: echo "Production deployment approved by ${{ github.actor }}"

  # ── Deploy to production ───────────────────────────────────────────────────
  deploy-production:
    name: "Deploy → Production"
    runs-on: ubuntu-latest
    needs: [resolve-tag, await-approval]
    environment:
      name: production
      url: https://profitflow.example.com
    # Store the previously-deployed tag so rollback can reference it
    outputs:
      previous_tag: ${{ steps.get-current.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Record the currently-running tag before we overwrite it
      - name: Get current production tag
        id: get-current
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key:      ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            CURRENT=$(docker inspect profitflow-api \
              --format '{{ index .Config.Labels "org.opencontainers.image.version" }}' \
              2>/dev/null || echo "unknown")
            echo "tag=$CURRENT" >> "$GITHUB_OUTPUT"

      # Blue/green: pull new image, start new container, health-check,
      # then stop the old one only after the new one is healthy.
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key:      ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /opt/profitflow

            docker pull ${{ env.IMAGE_BACKEND }}:${{ needs.resolve-tag.outputs.tag }}
            docker pull ${{ env.IMAGE_FRONTEND }}:${{ needs.resolve-tag.outputs.tag }}

            docker tag ${{ env.IMAGE_BACKEND }}:${{ needs.resolve-tag.outputs.tag }} \
                       ${{ env.IMAGE_BACKEND }}:current
            docker tag ${{ env.IMAGE_FRONTEND }}:${{ needs.resolve-tag.outputs.tag }} \
                       ${{ env.IMAGE_FRONTEND }}:current

            IMAGE_TAG=current docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for health probe before declaring success
            for i in {1..20}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
              if [[ "$STATUS" == "200" ]]; then
                echo "Production API is healthy (attempt $i)"
                exit 0
              fi
              echo "Attempt $i: status=$STATUS — retrying..."
              sleep 15
            done
            echo "Production health check failed after 5 minutes"
            exit 1

      - name: Notify Slack — production deployed
        uses: slackapi/slack-github-action@v1.27
        if: success()
        with:
          payload: |
            {
              "text": "🎉 *Production deploy SUCCEEDED* — `${{ needs.resolve-tag.outputs.tag }}`\nApproved & deployed by: `${{ github.actor }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ── Automatic rollback ─────────────────────────────────────────────────────
  rollback-production:
    name: "Auto-Rollback Production"
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()

    steps:
      - name: Rollback to previous image
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key:      ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /opt/profitflow

            PREV_TAG="${{ needs.deploy-production.outputs.previous_tag }}"
            if [[ -z "$PREV_TAG" || "$PREV_TAG" == "unknown" ]]; then
              echo "No previous tag recorded — cannot auto-rollback"
              exit 1
            fi

            echo "Rolling back to $PREV_TAG"
            docker tag ${{ env.IMAGE_BACKEND }}:$PREV_TAG ${{ env.IMAGE_BACKEND }}:current
            docker tag ${{ env.IMAGE_FRONTEND }}:$PREV_TAG ${{ env.IMAGE_FRONTEND }}:current
            IMAGE_TAG=current docker compose -f docker-compose.prod.yml up -d

            echo "Rollback to $PREV_TAG completed"

      - name: Notify Slack — rollback executed
        uses: slackapi/slack-github-action@v1.27
        if: always()
        with:
          payload: |
            {
              "text": "🔄 *Production ROLLED BACK* to `${{ needs.deploy-production.outputs.previous_tag }}`\nDeploy of `${{ needs.resolve-tag.outputs.tag }}` failed.\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed run>",
              "blocks": [{
                "type": "section",
                "text": { "type": "mrkdwn",
                  "text": "🚨 *Production ROLLBACK triggered*\n• Failed tag: `${{ needs.resolve-tag.outputs.tag }}`\n• Rolled back to: `${{ needs.deploy-production.outputs.previous_tag }}`\n• Triggered by: `${{ github.actor }}`"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
