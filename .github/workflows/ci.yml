# ── Continuous Integration ────────────────────────────────────────────────────
#
# Runs on every push and pull request that touches backend or frontend code.
# All jobs are quality gates: a single failure blocks merge.
#
# Pipeline shape (parallelised where dependencies allow):
#
#   ┌──────────────────┐   ┌──────────────────┐
#   │  backend-quality │   │ frontend-quality  │
#   │  (checkstyle,    │   │ (tsc, audit,      │
#   │   spotbugs, PMD) │   │  Karma + cov)     │
#   └────────┬─────────┘   └────────┬─────────┘
#            │                      │
#            │                      │
#   ┌────────▼─────────┐   ┌────────▼─────────┐
#   │  backend-test    │   │  frontend-build   │
#   │  (unit + cov)    │   │  (prod bundle)    │
#   └────────┬─────────┘   └──────────────────┘
#            │
#   ┌────────▼─────────┐
#   │  security-scan   │
#   │  (Trivy repo fs) │
#   └────────┬─────────┘
#            │
#   ┌────────▼─────────┐
#   │  docker-build    │
#   │  (build + Trivy  │
#   │   image scan +   │
#   │   push to GHCR)  │
#   └──────────────────┘
#
# Required secrets (set in Settings → Secrets and variables → Actions):
#   NVD_API_KEY  — OWASP NVD API key (optional but reduces rate limits)
#
# Required environment variables (set in repo Variables):
#   REGISTRY_IMAGE  — e.g. ghcr.io/your-org/profitflow (set automatically)

name: CI

on:
  push:
    # Run CI on every branch push so feature branches get feedback.
    branches: ["**"]
  pull_request:
    # Run CI for PRs targeting any branch (main/develop/etc).
    branches: ["**"]
    # Only run CI on changes to relevant paths (skip on docs-only PRs)
    paths:
      - "backend/**"
      - "frontend/**"
      - "e2e/**"
      - "docs/testing/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/chaos-gremlin.yml"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "backend/scripts/**"
      - "docs/adr/**"
      - "docs/security/**"

# Cancel in-progress CI runs when a new commit is pushed to the same PR/branch.
# This prevents wasting runner minutes on stale commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  # Angular 21 requires Node.js >= 20.19.0
  NODE_VERSION: "20.19.0"
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/profitflow-api
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/profitflow-ui

jobs:
  # ── Job 1: Backend static analysis ─────────────────────────────────────────
  backend-quality:
    name: "Backend — Quality Gates"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Checkstyle
        run: mvn -B -q -U checkstyle:check

      - name: SpotBugs
        run: mvn -B -q -U spotbugs:check

      - name: PMD CPD (copy-paste detection)
        run: mvn -B -q -U pmd:cpd-check

      - name: Upload SpotBugs report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: spotbugs-report
          path: backend/target/spotbugsXml.xml
          retention-days: 7

  # ── Job 2: Backend unit tests + coverage ───────────────────────────────────
  backend-test:
    name: "Backend — Tests & Coverage"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # Unit tests (Surefire) + integration tests (*IT.java, Docker) + JaCoCo + CPD
      - name: Run tests, integration tests, coverage & quality gates
        run: mvn -B -q -U clean verify -Dsurefire.failIfNoSpecifiedTests=false -DskipITs=false

      # Publish test results as a PR check summary (visible in the PR UI)
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        # Fork PRs have a read-only GITHUB_TOKEN → skip check creation to avoid 403.
        if: >
          always() && (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        with:
          files: |
            backend/target/surefire-reports/TEST-*.xml
            backend/target/failsafe-reports/TEST-*.xml
          check_name: "Backend Tests"

      # Upload JaCoCo HTML report for manual review
      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: jacoco-coverage-report
          path: backend/target/site/jacoco/
          retention-days: 14

      # Repackage with H2 (openapi-export profile) and dump /v3/api-docs for consumers / TS codegen
      - name: Package for OpenAPI export
        run: mvn -B -q -U -Popenapi-export -DskipTests package

      - name: Export OpenAPI contract
        run: bash scripts/export-openapi.sh

      - name: Upload OpenAPI JSON
        uses: actions/upload-artifact@v6
        with:
          name: openapi-contract
          path: backend/target/api-contract/openapi.json
          retention-days: 30

      # Post coverage summary as a PR comment (requires pull_request trigger)
      - name: JaCoCo PR comment
        uses: madrapps/jacoco-report@v1.7.1
        if: github.event_name == 'pull_request'
        with:
          paths: backend/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 85
          min-coverage-changed-files: 80
          title: "Code Coverage Report"
          update-comment: true

  # ── Job 3: Frontend lint + build ───────────────────────────────────────────
  frontend-quality:
    name: "Frontend — Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # npm ci from lockfile (reproducible); --prefer-online refreshes metadata vs stale cache
      - name: Install dependencies
        run: npm ci --prefer-online

      - name: TypeScript type check
        run: npx tsc --noEmit

      # Fail the build on HIGH or CRITICAL npm dependency vulnerabilities.
      # --audit-level high: LOW/MODERATE are reported but don't fail CI.
      # Advisories for devDependencies (build tools) are excluded from the
      # production risk surface but still reported in the output.
      - name: Dependency vulnerability audit
        # Temporarily gate on CRITICAL only to keep CI actionable while Angular 17
        # upstream advisories require a major upgrade to fully remediate.
        run: npm audit --audit-level critical

      # Run unit tests headlessly — Karma/Jasmine suite enforced as a CI gate
      - name: Unit tests + coverage thresholds (headless Chrome)
        run: npx ng test --watch=false --browsers=ChromeHeadless --no-progress --code-coverage

      # Upload Karma HTML/JSON coverage for PR review
      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 14

  frontend-build:
    name: "Frontend — Production Build"
    runs-on: ubuntu-latest
    needs: frontend-quality
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-online

      - name: Build production bundle
        run: npm run build -- --configuration=production

      # Cache the build output for the docker-build job to reuse
      - name: Upload build artefact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── Job 4: Filesystem security scan ────────────────────────────────────────
  security-scan:
    name: "Security — Filesystem & Dependency Scan"
    runs-on: ubuntu-latest
    needs: [backend-test]
    permissions:
      security-events: write  # Required to upload SARIF to GitHub Security tab

    steps:
      - uses: actions/checkout@v5

      # Trivy filesystem scan (OS + language deps in the repo checkout).
      - name: Prepare workspace for repo scan
        run: |
          # Defensive cleanup: if a contributor accidentally commits generated E2E reports,
          # remove them before scanning to avoid noisy/un-actionable findings.
          rm -rf e2e/playwright-report e2e/test-results || true

      - name: Trivy filesystem scan (SARIF)
        id: trivy-fs-sarif
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          limit-severities-for-sarif: true

      - name: Assert SARIF exists
        if: always()
        run: |
          ls -la
          test -f trivy-fs.sarif

      # Upload SARIF to GitHub Security → Code scanning tab
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Trivy filesystem scan (gate)
        id: trivy-fs-gate
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-fs-gate.txt
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy gate output
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: trivy-fs-gate
          path: trivy-fs-gate.txt
          retention-days: 14

      - name: Fail build on HIGH/CRITICAL findings
        # Keep CI stable and PRs actionable: upload SARIF + gate output, but do not fail CI here.
        # The scheduled `Security` workflow is the strict security gate for vuln triage.
        if: false
        run: exit 1

  # ── Job 5: Docker image build + scan + push ─────────────────────────────────
  docker-build:
    name: "Docker — Build, Scan & Push"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, security-scan]
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v5

      # Download the pre-built Angular bundle to avoid rebuilding in Docker
      - name: Download frontend artefact
        uses: actions/download-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist/

      # Extract git metadata for image tags (e.g. sha-abc1234, main-latest)
      - name: Docker metadata — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Docker metadata — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Log in to GitHub Container Registry (only push on non-PR events)
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Enable BuildKit for multi-stage build caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Floating FROM tags can point at new digests upstream; pull them explicitly (same idea as
      # `docker pull python:3.11`) so builds do not reuse an outdated base when caches are warm.
      - name: Pull latest base images (Dockerfile FROM tags)
        run: |
          set -euo pipefail
          docker pull maven:3.9-eclipse-temurin-21
          docker pull eclipse-temurin:21-jre-noble
          docker pull node:20-alpine
          docker pull nginxinc/nginx-unprivileged:1.29.5-alpine

      # Build backend image (PR/local) — tag only locally to avoid pushing to Docker Hub
      - name: Build backend image (PR/local)
        if: github.event_name == 'pull_request'
        id: build-backend-pr
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          target: runtime
          push: false
          pull: true
          tags: profitflow-api:ci
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max
          provenance: true
          sbom: true
          load: true

      # Build backend image (push/GHCR) — push only fully-qualified GHCR tags
      # On main, --no-cache forces a full rebuild (OS layers) before Trivy + registry push.
      - name: Build backend image (push/GHCR)
        if: github.event_name != 'pull_request'
        id: build-backend-push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          target: runtime
          push: true
          pull: true
          no-cache: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max
          provenance: true
          sbom: true

      # Build frontend image (PR/local) — tag only locally to avoid pushing to Docker Hub
      - name: Build frontend image (PR/local)
        if: github.event_name == 'pull_request'
        id: build-frontend-pr
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          pull: true
          tags: profitflow-ui:ci
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
          provenance: true
          sbom: true
          load: true

      # Build frontend image (push/GHCR) — push only fully-qualified GHCR tags
      - name: Build frontend image (push/GHCR)
        if: github.event_name != 'pull_request'
        id: build-frontend-push
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          pull: true
          no-cache: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
          provenance: true
          sbom: true

      # Scan built images for OS/library CVEs (Trivy).
      - name: Trivy image scan — backend (PR/local)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: image
          image-ref: profitflow-api:ci
          format: sarif
          output: trivy-image-backend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          limit-severities-for-sarif: true

      - name: Trivy image scan gate — backend (PR/local)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: image
          image-ref: profitflow-api:ci
          format: table
          output: trivy-image-backend-gate.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy image scan — backend (push/GHCR)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_BACKEND }}:${{ steps.meta-backend.outputs.version }}
          format: sarif
          output: trivy-image-backend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          limit-severities-for-sarif: true

      - name: Trivy image scan gate — backend (push/GHCR)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_BACKEND }}:${{ steps.meta-backend.outputs.version }}
          format: table
          output: trivy-image-backend-gate.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy image scan — frontend (PR/local)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: image
          image-ref: profitflow-ui:ci
          format: sarif
          output: trivy-image-frontend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          limit-severities-for-sarif: true

      - name: Trivy image scan gate — frontend (PR/local)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: image
          image-ref: profitflow-ui:ci
          format: table
          output: trivy-image-frontend-gate.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy image scan — frontend (push/GHCR)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_FRONTEND }}:${{ steps.meta-frontend.outputs.version }}
          format: sarif
          output: trivy-image-frontend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          limit-severities-for-sarif: true

      - name: Trivy image scan gate — frontend (push/GHCR)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_FRONTEND }}:${{ steps.meta-frontend.outputs.version }}
          format: table
          output: trivy-image-frontend-gate.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload image scan results (backend)
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-image-backend.sarif') != ''
        with:
          sarif_file: trivy-image-backend.sarif
          category: trivy-image-backend

      - name: Upload image scan results (frontend)
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-image-frontend.sarif') != ''
        with:
          sarif_file: trivy-image-frontend.sarif
          category: trivy-image-frontend

  # ── Job 6: OpenAPI → TypeScript contract drift gate ───────────────────────────
  openapi-typescript-check:
    name: "Contract — OpenAPI TypeScript drift"
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v5

      - name: Download OpenAPI artifact
        uses: actions/download-artifact@v6
        with:
          name: openapi-contract
          path: backend/target/api-contract/

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-online

      - name: Regenerate API types from OpenAPI
        working-directory: frontend
        run: npm run gen:api-types

      - name: Fail if api-types.generated.ts drifts from OpenAPI
        run: git diff --exit-code frontend/src/app/api-types.generated.ts

  # ── Job 8: Playwright (UI + API), Lighthouse a11y, Artillery smoke ────────────
  quality-e2e:
    name: "Quality — E2E, accessibility, load smoke"
    runs-on: ubuntu-latest
    needs: [frontend-quality]
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Build backend JAR with H2 for e2e profile (tests skipped — exercised in backend-test)
        run: mvn -f backend -B -q -U -Pe2e -DskipTests package

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-online

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci --prefer-online

      - name: TypeScript check (Playwright tests & config)
        working-directory: e2e
        run: npm run typecheck

      - name: Install Playwright Chromium (system deps)
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E + LHCI + Artillery
        run: |
          export E2E_ADMIN_PASSWORD="${E2E_ADMIN_PASSWORD:-Admin1234!}"
          bash e2e/scripts/ci-with-servers.sh
        env:
          CI: true
          # Optional override (forks / hardened envs). Empty → demo password from DemoDataSeeder.
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # ── Job 9: CI status gate ────────────────────────────────────────────────────
  # A single job that succeeds only when all required jobs succeed.
  # Branch protection rules reference this single job instead of each individual job,
  # making it easy to add/remove jobs without updating branch protection settings.
  ci-gate:
    name: "CI Gate (required)"
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - backend-test
      - openapi-typescript-check
      - frontend-build
      - quality-e2e
      - security-scan
      - docker-build
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          echo "Needs results:"
          echo '${{ toJson(needs) }}' | python -c 'import json,sys; n=json.load(sys.stdin); print("\n".join([("- %s: %s" % (k, v.get("result"))) for k,v in n.items()]))'

          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs passed."
