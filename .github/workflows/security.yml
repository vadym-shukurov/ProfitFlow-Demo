# ── Scheduled Security Scanning ───────────────────────────────────────────────
#
# Runs on a weekly schedule (Sunday 02:00 UTC) and on pushes to main that
# touch dependency manifests.
#
# Finance applications require continuous vulnerability monitoring because:
# - New CVEs are published daily against in-use library versions
# - OWASP NVD database grows ~250 new entries per day
# - Regulatory frameworks (PCI-DSS, SOX) mandate periodic dependency audits
#
# Jobs:
#   1. owasp-dependency-check   — CVSS ≥ 7.0 fails the build
#   2. trivy-deep-scan           — scans pushed container images in GHCR
#   3. codeql-analysis           — GitHub's semantic code analysis (SAST)
#   4. secret-scan               — Gitleaks detects committed secrets
#   5. dependency-review         — PR-gating for newly introduced CVEs
#
# Results upload to: GitHub Security → Code scanning alerts

name: Security

on:
  schedule:
    # Weekly full scan: Sunday 02:00 UTC (outside business hours)
    - cron: "0 2 * * 0"
  push:
    branches: [main]
    paths:
      - "backend/pom.xml"
      - "frontend/package-lock.json"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
  pull_request:
    branches: [main]
    paths:
      - "backend/pom.xml"
      - "frontend/package-lock.json"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ── OWASP Dependency Check ─────────────────────────────────────────────────
  # Queries the NVD CVE database and fails if any dependency has a CVSS ≥ 7.0.
  # Results are uploaded as SARIF to GitHub Security tab.
  owasp-dependency-check:
    name: "OWASP Dependency Check"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # Cache the NVD database between runs — saves ~4 minutes per scan
      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/dependency-check-data
          key: nvd-db-${{ hashFiles('backend/pom.xml') }}
          restore-keys: nvd-db-

      - name: Run OWASP Dependency Check
        working-directory: backend
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          # This job is a dependency audit; tests are skipped, so JaCoCo coverage gates
          # (bound to verify) would fail due to missing execution data. Skip JaCoCo here.
          mvn verify -Powasp-check -DskipTests -Djacoco.skip=true -B -q || {
            echo "OWASP check found HIGH/CRITICAL vulnerabilities!"
            echo "Review the report in the artifacts section."
            exit 1
          }

      - name: Upload OWASP HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: backend/target/dependency-check-report.html
          retention-days: 30

      # Convert OWASP XML report to SARIF for GitHub Security tab
      - name: Convert OWASP report to SARIF
        if: always()
        run: |
          docker run --rm \
            -v "${PWD}:/src" \
            -w /src \
            owasp/dependency-check:latest \
            --scan /src/backend \
            --format SARIF \
            --out /src \
            --noupdate

      - name: Upload OWASP SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dependency-check-report.sarif
          category: owasp

  # ── npm audit ─────────────────────────────────────────────────────────────
  npm-audit:
    name: "npm Audit"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      # Fail on HIGH or CRITICAL npm vulnerabilities (audit-level=high)
      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=critical --json > npm-audit.json || true

      - name: Check for high/critical issues
        working-directory: frontend
        run: |
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' npm-audit.json)
          CRIT=$(jq '.metadata.vulnerabilities.critical // 0' npm-audit.json)
          echo "High: $HIGH | Critical: $CRIT"
          if [[ "$CRIT" -gt 0 ]]; then
            echo "::error::npm audit found $CRIT critical vulnerabilities"
            jq '.vulnerabilities | to_entries[] | select(.value.severity == "critical") | .key' npm-audit.json
            exit 1
          fi
          echo "No critical npm vulnerabilities found."

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: frontend/npm-audit.json
          retention-days: 30

  # ── CodeQL SAST ────────────────────────────────────────────────────────────
  # Semantic code analysis for Java — detects injection, path traversal,
  # insecure deserialization, and other OWASP Top 10 patterns.
  codeql:
    name: "CodeQL SAST"
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [java, javascript]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.language == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use the extended security-and-quality query suite for finance apps
          queries: security-and-quality

      # For Java, we need to build the project so CodeQL can analyse bytecode
      - name: Build (Java)
        if: matrix.language == 'java'
        working-directory: backend
        run: mvn compile -DskipTests -B -q

      - name: Autobuild (JS/TS)
        if: matrix.language == 'javascript'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-${{ matrix.language }}
          upload: true

  # ── Secret scanning (Gitleaks) ─────────────────────────────────────────────
  # Detects committed secrets, API keys, and credentials in the full git history.
  secret-scan:
    name: "Secret Scan (Gitleaks)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history — Gitleaks scans all commits

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set GITLEAKS_LICENSE if using the commercial version (for orgs)

  # ── Dependency Review (PR gate) ────────────────────────────────────────────
  # Blocks PRs that introduce new HIGH/CRITICAL CVEs in pom.xml or package-lock.json.
  # This is a fast check (uses GitHub Advisory Database, not NVD) and runs on every PR.
  dependency-review:
    name: "Dependency Review"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Allow packages with CVSS < 7.0 through without blocking
          vulnerability-check: true
          license-check: true
          # Deny copyleft licenses in a commercial finance app
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0
          comment-summary-in-pr: always

  # ── Trivy container image scan (weekly) ───────────────────────────────────
  # Scans the latest production images in GHCR for OS-level CVEs.
  trivy-image-scan:
    name: "Trivy — Container Image Scan"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      packages: read
      security-events: write

    strategy:
      matrix:
        image: [profitflow-api, profitflow-ui]

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pinned to a specific commit SHA for supply-chain security (no floating @master tag)
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@76071ef0d7aad71c4a07d374f76de96e85dfbfbd
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: false  # Weekly scan: include ALL known CVEs

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-weekly-${{ matrix.image }}

      - name: Notify on findings
        if: failure()
        uses: slackapi/slack-github-action@v1.27
        with:
          payload: |
            {
              "text": "🚨 *Weekly Trivy scan* found HIGH/CRITICAL CVEs in `${{ matrix.image }}`.\n<${{ github.server_url }}/${{ github.repository }}/security/code-scanning|View Security Alerts>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
