# nginx configuration for serving the Angular SPA behind a reverse proxy.
#
# Security posture:
#   - server_tokens off — hides nginx version from headers/error pages
#   - X-Frame-Options, X-Content-Type-Options, Referrer-Policy — defence-in-depth
#     (also set by Spring Security, but belt-and-suspenders for static assets)
#   - CSP set to 'self' for static delivery; overridden by the API server for API responses
#   - gzip on — reduces bundle transfer size by ~70%
#   - SPA fallback — all unknown paths serve index.html for Angular routing
#   - /api/* reverse-proxied to the backend (must set BACKEND_URL env var)

server {
    listen       80;
    server_name  _;
    server_tokens off;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                    always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header Referrer-Policy           "strict-origin"           always;
    add_header Permissions-Policy        "geolocation=(), camera=()" always;
    # CSP is intentionally permissive here — tighten per environment via
    # the NGINX_CSP_HEADER env var in the deployment manifest.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self';"
        always;

    # ── Caching ──────────────────────────────────────────────────────────────
    # Fingerprinted chunk files (e.g. main-4DCS65DQ.js) can be cached forever.
    location ~* \.[0-9a-f]{8}\.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static assets — moderate cache
    location ~* \.(png|ico|svg|jpg|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── API reverse proxy ─────────────────────────────────────────────────────
    # Routes /api/* and /actuator/* to the Spring Boot backend.
    # BACKEND_URL is injected at runtime via envsubst or Kubernetes ConfigMap.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # Angular routing: all non-file paths return index.html.
    # Cache index.html for a short time only — it contains hashed asset refs
    # that must change on deployment.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
