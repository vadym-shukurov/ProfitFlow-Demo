# Local nginx configuration for serving the Angular SPA + proxying /api to the local backend container.
#
# Differences vs nginx.conf:
# - proxy_pass points at the docker-compose service name `profitflow-api`
server {
    listen       8080;
    server_name  _;
    server_tokens off;

    root  /tmp/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm;
    gzip_min_length 1024;
    gzip_vary on;

    add_header X-Frame-Options           "DENY"                    always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header Referrer-Policy           "strict-origin"           always;
    add_header Permissions-Policy        "geolocation=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self';"
        always;

    location ~* \.[0-9a-f]{8}\.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|ico|svg|jpg|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /api/ {
        proxy_pass         http://profitflow-api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /actuator/ {
        proxy_pass         http://profitflow-api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

