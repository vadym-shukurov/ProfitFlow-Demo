app = "profitflow-ui-production"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[experimental]
# Pin ENTRYPOINT and CMD explicitly so Fly doesn't duplicate/merge them incorrectly.
# (Observed crash loop: `/docker-entrypoint.sh /docker-entrypoint.sh nginx ...; nginx ...;` -> `nginx: invalid option: "nginx"`.)
entrypoint = ["/docker-entrypoint.sh"]
cmd = ["nginx", "-g", "daemon off;"]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 400

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "45s"
    method = "GET"
    path = "/"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
